name: Build And Push GHCR Image

on:
  workflow_call:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the current commit SHA.
        required: false
        type: string
      push_latest:
        description: Also publish the `latest` tag.
        required: false
        default: false
        type: boolean
  workflow_dispatch:
    inputs:
      image_tag:
        description: Optional image tag. Defaults to the current commit SHA.
        required: false
        type: string
      push_latest:
        description: Also publish the `latest` tag.
        required: false
        default: false
        type: boolean

permissions:
  contents: read
  packages: write

concurrency:
  group: build-push-ghcr-image-xworkmate-web-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_REPO_OWNER: ${{ vars.IMAGE_REPO_OWNER || github.repository_owner }}

jobs:
  build-and-push:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ vars.GHCR_USERNAME || github.repository_owner }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}

      - name: Resolve image metadata
        id: meta
        shell: bash
        env:
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          image_tag="${IMAGE_TAG_INPUT:-}"
          if [[ -z "${image_tag}" ]]; then
            image_tag="${GITHUB_SHA::7}"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"

      - name: Build and push xworkmate-web image
        id: build
        shell: bash
        run: |
          bash ./scripts/ci/build_and_push_ghcr_image.sh \
            "${{ env.REGISTRY }}" \
            "${{ env.IMAGE_REPO_OWNER }}" \
            "${{ steps.meta.outputs.image_tag }}"

      - name: Push latest tag
        if: ${{ inputs.push_latest }}
        shell: bash
        run: |
          image_ref="${{ steps.build.outputs.image_ref }}"
          latest_ref="${{ env.REGISTRY }}/${{ env.IMAGE_REPO_OWNER }}/xworkmate-web:latest"
          docker buildx imagetools create -t "${latest_ref}" "${image_ref}"
