name: Architecture Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FLUTTER_VERSION: '3.29.0'

jobs:
  # =============================================================================
  # Architecture Matrix Tests (Layers 2-5 & Cross-cutting)
  # =============================================================================
  architecture-tests:
    name: '[${{ matrix.layer }}] ${{ matrix.test_type }}'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - layer: layer2
            test_type: golden
            command: flutter test test/golden/golden_test.dart --update-goldens
            artifact_name: golden-l2-app-shell
            artifact_path: test/golden/goldens/
          - layer: layer2
            test_type: integration
            command: flutter test test/widget_test.dart
            artifact_name: integration-l2-widget
            artifact_path: build/integration_test_results/
          - layer: layer3
            test_type: golden
            command: flutter test test/golden/architecture_golden_test.dart --name='task_rail\|thread_switched\|task_thread'
            artifact_name: golden-l3-taskthread
            artifact_path: test/golden/goldens/
          - layer: layer3
            test_type: integration
            command: flutter test integration_test/architecture_layers_test.dart --name='TaskThread'
            artifact_name: integration-l3-taskthread
            artifact_path: build/integration_test_results/
          - layer: layer4
            test_type: golden
            command: flutter test test/golden/architecture_golden_test.dart --name='execution\|connection'
            artifact_name: golden-l4-gotaskservice
            artifact_path: test/golden/goldens/
          - layer: layer4
            test_type: integration
            command: flutter test integration_test/architecture_layers_test.dart --name='GoTaskService\|Dispatch'
            artifact_name: integration-l4-gotaskservice
            artifact_path: build/integration_test_results/
          - layer: layer5
            test_type: golden
            command: flutter test test/golden/architecture_golden_test.dart --name='settings\|skills'
            artifact_name: golden-l5-service
            artifact_path: test/golden/goldens/
          - layer: layer5
            test_type: integration
            command: flutter test integration_test/architecture_integration_test.dart --name='Service Integration'
            artifact_name: integration-l5-service
            artifact_path: build/integration_test_results/
          - layer: crosscut
            test_type: integration
            command: flutter test integration_test/architecture_integration_test.dart --name='Security\|Persistence'
            artifact_name: integration-cross-security
            artifact_path: build/integration_test_results/
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: ${{ matrix.command }}
      - name: Upload artifacts
        if: failure() || (matrix.test_type == 'golden' && always())
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}

  # =============================================================================
  # Feature & Runtime Tests
  # =============================================================================
  feature-tests:
    name: '[Features] Feature Tests'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        test-file:
          - test/features/settings_page_test.dart
          - test/features/assistant_page_test.dart
          - test/features/tasks_page_test.dart
          - test/features/ai_gateway_page_test.dart
          - test/features/skills_page_test.dart
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter test ${{ matrix.test-file }}

  runtime-tests:
    name: '[Runtime] Runtime Tests'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter test test/runtime/

  # =============================================================================
  # Patrol E2E (Release Phase - requires device)
  # =============================================================================
  patrol-e2e:
    name: '[Patrol] E2E Tests'
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: dart pub global activate patrol
      - run: flutter pub run patrol test patrol_test/architecture_patrol_test.dart
        env:
          PATROL_ANDROID_API_KEY: ${{ secrets.PATROL_ANDROID_API_KEY }}
          PATROL_IOS_API_KEY: ${{ secrets.PATROL_IOS_API_KEY }}

  # =============================================================================
  # Full Architecture Flow Test
  # =============================================================================
  architecture-flow-test:
    name: '[Flow] Architecture Full Flow'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
      - run: flutter pub get
      - run: flutter test integration_test/architecture_integration_test.dart --name='full flow'
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flow-test-results
          path: build/

  # =============================================================================
  # Summary (runs after all other jobs)
  # =============================================================================
  test-summary:
    name: Test Summary
    needs:
      - architecture-tests
      - feature-tests
      - runtime-tests
      - architecture-flow-test
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Build Test Summary
        run: |
          echo "## Architecture Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Layer | Test Type | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Architecture Matrix | All | ${{ needs.architecture-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Features | Feature Tests | ${{ needs.feature-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Runtime | Runtime Tests | ${{ needs.runtime-tests.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Flow | Architecture Flow | ${{ needs.architecture-flow-test.result }} |" >> $GITHUB_STEP_SUMMARY
